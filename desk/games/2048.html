<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048 — SKL Games</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0d0b14 0%, #1a1630 50%, #120f1e 100%);
      color: #eef0ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin: 0 0 8px;
      background: linear-gradient(135deg, #00d2ff, #818cf8, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sub {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 20px;
    }
    .header-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .score-box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 10px 20px;
      text-align: center;
    }
    .score-box span { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.8; }
    .score-box strong { display: block; font-size: 1.5rem; color: #00d2ff; }
    .btn {
      background: linear-gradient(135deg, rgba(129,140,248,0.4), rgba(139,92,246,0.4));
      border: 1px solid rgba(129,140,248,0.5);
      color: #fff;
      padding: 10px 20px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 20px rgba(129,140,248,0.35);
    }
    .btn:active { transform: scale(0.98); }
    .grid-wrap {
      background: rgba(0,0,0,0.25);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.06);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 90px);
      grid-template-rows: repeat(4, 90px);
      gap: 10px;
      width: 400px;
      height: 400px;
    }
    .cell {
      width: 90px;
      height: 90px;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      transition: transform 0.12s ease, background 0.15s;
      overflow: hidden;
    }
    .cell.tile {
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }
    .cell.tile-merge {
      animation: tile-merge 0.25s ease-out;
    }
    @keyframes tile-merge {
      0% { transform: scale(1); }
      50% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    .cell.tile-2   { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; }
    .cell.tile-4   { background: linear-gradient(135deg, #00d2ff, #0099cc); color: #fff; }
    .cell.tile-8   { background: linear-gradient(135deg, #818cf8, #6366f1); color: #fff; }
    .cell.tile-16  { background: linear-gradient(135deg, #a855f7, #9333ea); color: #fff; }
    .cell.tile-32  { background: linear-gradient(135deg, #ec4899, #db2777); color: #fff; }
    .cell.tile-64  { background: linear-gradient(135deg, #f43f5e, #e11d48); color: #fff; }
    .cell.tile-128 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #0d0b14; font-size: 24px; }
    .cell.tile-256 { background: linear-gradient(135deg, #34d399, #10b981); color: #0d0b14; font-size: 24px; }
    .cell.tile-512 { background: linear-gradient(135deg, #22d3ee, #06b6d4); color: #0d0b14; font-size: 22px; }
    .cell.tile-1024{ background: linear-gradient(135deg, #a78bfa, #8b5cf6); color: #fff; font-size: 20px; }
    .cell.tile-2048{ background: linear-gradient(135deg, #fcd34d, #fbbf24); color: #0d0b14; font-size: 20px; box-shadow: 0 0 30px rgba(252,211,77,0.5); }
    .cell.tile-super { background: linear-gradient(135deg, #00d2ff, #a855f7); color: #fff; font-size: 18px; }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 20px;
    }
    .overlay.show { display: flex; }
    .overlay-box {
      background: linear-gradient(180deg, #1a1630, #120f1e);
      border: 1px solid rgba(129,140,248,0.3);
      border-radius: 20px;
      padding: 32px;
      text-align: center;
      max-width: 320px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    .overlay-box h2 { margin: 0 0 12px; font-size: 1.5rem; }
    .overlay-box p { margin: 0 0 24px; opacity: 0.9; }
    .overlay-box .btn { margin: 0 6px; }
    .hint {
      margin-top: 16px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <h1>2048</h1>
  <p class="sub">Объединяй плитки и получи 2048!</p>
  <div class="header-row">
    <div class="score-box"><span>Счёт</span><strong id="score">0</strong></div>
    <div class="score-box"><span>Рекорд</span><strong id="best">0</strong></div>
    <button type="button" class="btn" id="newGame">Новая игра</button>
  </div>
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>
  <p class="hint">Используйте стрелки</p>

  <div class="overlay" id="winOverlay">
    <div class="overlay-box">
      <h2>Победа!</h2>
      <p>Ты собрал 2048. Продолжить до большего?</p>
      <button type="button" class="btn" id="winContinue">Продолжить</button>
      <button type="button" class="btn" id="winNew">Новая игра</button>
    </div>
  </div>
  <div class="overlay" id="loseOverlay">
    <div class="overlay-box">
      <h2>Конец игры</h2>
      <p>Ходов больше нет. Твой счёт: <strong id="finalScore">0</strong></p>
      <button type="button" class="btn" id="loseNew">Играть снова</button>
    </div>
  </div>

  <script>
    (function () {
      var SIZE = 4;
      var grid = [];
      var score = 0;
      var best = parseInt(localStorage.getItem('2048-best') || '0', 10);
      var won = false;
      var moved = false;

      var elGrid = document.getElementById('grid');
      var elScore = document.getElementById('score');
      var elBest = document.getElementById('best');
      var elNewGame = document.getElementById('newGame');
      var winOverlay = document.getElementById('winOverlay');
      var loseOverlay = document.getElementById('loseOverlay');
      var elFinalScore = document.getElementById('finalScore');

      function initGrid() {
        grid = [];
        for (var r = 0; r < SIZE; r++) {
          grid[r] = [];
          for (var c = 0; c < SIZE; c++) grid[r][c] = 0;
        }
      }

      function emptyCells() {
        var out = [];
        for (var r = 0; r < SIZE; r++)
          for (var c = 0; c < SIZE; c++)
            if (grid[r][c] === 0) out.push({ r: r, c: c });
        return out;
      }

      function addRandom() {
        var cells = emptyCells();
        if (cells.length === 0) return false;
        var cell = cells[Math.floor(Math.random() * cells.length)];
        grid[cell.r][cell.c] = Math.random() < 0.9 ? 2 : 4;
        return true;
      }

      function render(mergedCells) {
        mergedCells = mergedCells || [];
        elGrid.innerHTML = '';
        for (var r = 0; r < SIZE; r++) {
          for (var c = 0; c < SIZE; c++) {
            var div = document.createElement('div');
            div.className = 'cell';
            var v = grid[r][c];
            if (v > 0) {
              div.classList.add('tile', 'tile-' + (v <= 2048 ? v : 'super'));
              var isMerged = mergedCells.some(function (p) { return p[0] === r && p[1] === c; });
              if (isMerged) div.classList.add('tile-merge');
              div.textContent = v;
            }
            elGrid.appendChild(div);
          }
        }
        elScore.textContent = score;
        elBest.textContent = best;
      }

      function slideLeft() {
        moved = false;
        var merged = [];
        for (var r = 0; r < SIZE; r++) {
          var row = grid[r].filter(function (x) { return x > 0; });
          var newRow = [];
          var i = 0;
          while (i < row.length) {
            if (i + 1 < row.length && row[i] === row[i + 1]) {
              newRow.push(row[i] * 2);
              merged.push([r, newRow.length - 1]);
              score += row[i] * 2;
              moved = true;
              i += 2;
            } else {
              newRow.push(row[i]);
              i++;
            }
          }
          while (newRow.length < SIZE) newRow.push(0);
          if (newRow.join(',') !== grid[r].join(',')) moved = true;
          grid[r] = newRow;
        }
        return { moved: moved, merged: merged };
      }

      function rotate() {
        var next = [];
        for (var c = 0; c < SIZE; c++) {
          next[c] = [];
          for (var r = SIZE - 1; r >= 0; r--) next[c].push(grid[r][c]);
        }
        grid = next;
      }

      function rotateCoordBack(r, c, times) {
        for (var t = 0; t < times; t++) {
          var nr = c;
          var nc = SIZE - 1 - r;
          r = nr;
          c = nc;
        }
        return [r, c];
      }

      function move(dir) {
        for (var i = 0; i < dir; i++) rotate();
        var result = slideLeft();
        var changed = result.moved;
        var merged = result.merged || [];
        var rotBack = (4 - dir) % 4;
        for (var i = 0; i < rotBack; i++) rotate();
        for (var m = 0; m < merged.length; m++) {
          var p = rotateCoordBack(merged[m][0], merged[m][1], rotBack);
          merged[m] = p;
        }
        if (changed) {
          addRandom();
          render(merged);
          if (score > best) {
            best = score;
            localStorage.setItem('2048-best', String(best));
          }
          if (!canMove()) setTimeout(showLose, 200);
        }
        return changed;
      }

      function canMove() {
        for (var r = 0; r < SIZE; r++)
          for (var c = 0; c < SIZE; c++) {
            if (grid[r][c] === 0) return true;
            var v = grid[r][c];
            if (c + 1 < SIZE && grid[r][c + 1] === v) return true;
            if (r + 1 < SIZE && grid[r + 1][c] === v) return true;
          }
        return false;
      }

      function has2048() {
        for (var r = 0; r < SIZE; r++)
          for (var c = 0; c < SIZE; c++)
            if (grid[r][c] === 2048) return true;
        return false;
      }

      function showWin() {
        winOverlay.classList.add('show');
      }
      function showLose() {
        elFinalScore.textContent = score;
        loseOverlay.classList.add('show');
      }

      function startNew() {
        initGrid();
        score = 0;
        won = false;
        addRandom();
        addRandom();
        render();
        winOverlay.classList.remove('show');
        loseOverlay.classList.remove('show');
      }

      document.getElementById('newGame').addEventListener('click', startNew);
      document.getElementById('winContinue').addEventListener('click', function () {
        won = true;
        winOverlay.classList.remove('show');
      });
      document.getElementById('winNew').addEventListener('click', function () {
        winOverlay.classList.remove('show');
        startNew();
      });
      document.getElementById('loseNew').addEventListener('click', function () {
        loseOverlay.classList.remove('show');
        startNew();
      });

      var keyDir = { 37: 0, 38: 3, 39: 2, 40: 1 };
      document.addEventListener('keydown', function (e) {
        if (winOverlay.classList.contains('show') || loseOverlay.classList.contains('show')) return;
        var d = keyDir[e.keyCode];
        if (d != null) {
          e.preventDefault();
          move(d);
          if (!won && has2048()) showWin();
        }
      });

      var touchStart = null;
      elGrid.addEventListener('touchstart', function (e) {
        touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }, { passive: true });
      elGrid.addEventListener('touchend', function (e) {
        if (!touchStart || winOverlay.classList.contains('show') || loseOverlay.classList.contains('show')) return;
        var dx = e.changedTouches[0].clientX - touchStart.x;
        var dy = e.changedTouches[0].clientY - touchStart.y;
        var dir = null;
        if (Math.abs(dx) > Math.abs(dy)) dir = dx > 0 ? 2 : 0;
        else dir = dy > 0 ? 1 : 3;
        if (dir != null) move(dir);
        if (!won && has2048()) showWin();
        touchStart = null;
      }, { passive: true });

      startNew();
    })();
  </script>
</body>
</html>
